# TapData Deploy (Matrix) —— 租户端 caller（自动部署主入口，调用 worker 的 matrix 部署）
# ============================================================================
# 这是租户仓库的【主】部署入口：隐藏自动跳过步骤的 matrix 版部署。
# 触发方式（与现有单仓库 caller 一致）：
#   - push 到 main 且改动 *_tapdata_export/** → 自动部署到 dev
#   - 推送 tag → 自动部署到 sit
#   - workflow_dispatch 手动触发 → 部署到所选环境
#
# 部署逻辑是多租户：实际运行 actions 的是本租户仓库，通过 uses: 调用 worker 仓库的
# tapdata-deploy-matrix.yml（worker 作为共享部署引擎被复用）。
#
# 重要：旧的 tapdata-deploy.yml caller 已移到 .github/disabled/（自动触发原样保留但
# 不生效）。若日后要把它移回 .github/workflows/ 启用，需先停用本 matrix 版的 push/tags，
# 否则同一次 push/tag 会同时触发新旧两条流水线、部署两遍。
# ============================================================================
name: TapData Deploy (Matrix)

on:
  push:
    branches: [main]
    paths:
      - '*_tapdata_export/**'
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - sit
          - lpt
      project:
        description: 'Project name (留空则取 vars.PROJECT_NAME，再回落到仓库名)'
        required: false
        type: string
        default: ''

jobs:
  deploy:
    # TODO: Replace {WORKER_REPO} with actual org/repo, e.g. your-org/tapdata-cicd-worker
    uses: "sam101010101010/cicd-worker/.github/workflows/tapdata-deploy-matrix.yml@main"
    with:
      project: ${{ inputs.project || vars.PROJECT_NAME || github.event.repository.name }}
      target_env: ${{ inputs.target_env || '' }}
      caller_repo: ${{ github.repository }}
      caller_sha: ${{ github.sha }}
      caller_event: ${{ github.event_name }}
      caller_ref: ${{ github.ref }}
      worker_repo: "sam101010101010/cicd-worker"
    secrets: inherit
