# TapData Deploy (Matrix) —— 租户端 caller（手动触发，调用 worker 的 matrix 部署）
# ============================================================================
# 这是租户仓库里的调用入口，用于试用"隐藏自动跳过步骤"的 matrix 部署。
# 与现有 tapdata-deploy.yml caller 并存，不影响现有 push/tag 自动部署：
#   - 本文件仅 workflow_dispatch（手动）触发，不监听 push/tag，避免与现有 caller
#     在同一次 push 上双重运行。
#   - 在租户仓库 Actions → "TapData Deploy (Matrix)" → Run workflow 手动跑即可。
#
# 部署逻辑仍是多租户：实际运行 actions 的是本租户仓库，通过 uses: 调用 worker
# 仓库的 tapdata-deploy-matrix.yml（worker 作为共享部署引擎被复用）。
#
# 试用满意后，如需自动化，可把现有 caller 切换为本 matrix 版（补上 push/tags 触发，
# 并停用旧 caller，避免双触发）。
# ============================================================================
name: TapData Deploy (Matrix)

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - sit
          - lpt
      project:
        description: 'Project name (留空则取 vars.PROJECT_NAME，再回落到仓库名)'
        required: false
        type: string
        default: ''

jobs:
  deploy:
    # TODO: Replace {WORKER_REPO} with actual org/repo, e.g. your-org/tapdata-cicd-worker
    uses: "sam101010101010/cicd-worker/.github/workflows/tapdata-deploy-matrix.yml@main"
    with:
      project: ${{ inputs.project || vars.PROJECT_NAME || github.event.repository.name }}
      target_env: ${{ inputs.target_env || '' }}
      caller_repo: ${{ github.repository }}
      caller_sha: ${{ github.sha }}
      caller_event: ${{ github.event_name }}
      caller_ref: ${{ github.ref }}
      worker_repo: "sam101010101010/cicd-worker"
    secrets: inherit
