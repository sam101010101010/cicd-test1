# ⏸ 已停用（parked）—— 旧版独立 job 部署 caller，保留完整自动触发，暂不生效
# ============================================================================
# 本文件放在 .github/disabled/ 下。GitHub 只扫描 .github/workflows/ 里的 YAML，
# 因此本文件当前完全不触发、也不出现在 Actions 列表。
#
# 自动触发逻辑（push 到 main → dev / 推 tag → sit / 手动 dispatch）原样保留，未做
# 任何删改。当前生效的是 matrix 版（.github/workflows/tapdata-deploy-matrix.yml）。
#
# 何时/如何重新启用：
#   把本文件移回 .github/workflows/ 即可直接生效。
#   ⚠ 移回前请先停用 matrix 版的自动触发（tapdata-deploy-matrix.yml 去掉 push/tags，
#     或一并移走），否则同一次 push/tag 会同时触发新旧两条流水线、部署两遍。
# ============================================================================
name: TapData Deploy

on:
  push:
    branches: [main]
    paths:
      - '*_tapdata_export/**'
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - sit
          - lpt
      project:
        description: 'Project name (留空则取 vars.PROJECT_NAME，再回落到仓库名)'
        required: false
        type: string
        default: ''

jobs:
  deploy:
    # TODO: Replace {WORKER_REPO} with actual org/repo, e.g. your-org/tapdata-cicd-worker
    uses: "{WORKER_REPO}/.github/workflows/tapdata-deploy.yml@main"
    with:
      project: ${{ inputs.project || vars.PROJECT_NAME || github.event.repository.name }}
      target_env: ${{ inputs.target_env || '' }}
      caller_repo: ${{ github.repository }}
      caller_sha: ${{ github.sha }}
      caller_event: ${{ github.event_name }}
      caller_ref: ${{ github.ref }}
      worker_repo: "{WORKER_REPO}"
    secrets: inherit
